<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raz Ahamed (Shrabon) Sports Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b101e; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: #121829; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f2940; }
        .logo { font-size: 22px; font-weight: bold; color: #00e5ff; }
        .logo span { color: #8e9bb0; font-size: 14px; font-weight: normal; margin-left: 10px; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* প্লেয়ার সেকশন */
        .player-section { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .video-wrapper { flex: 1; background: #000; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #1f2940; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .status-bar { display: flex; justify-content: space-between; padding-top: 15px; font-size: 13px; color: #8e9bb0; }

        /* সাইডবার */
        .sidebar { width: 380px; background: #121829; border-left: 1px solid #1f2940; display: flex; flex-direction: column; }
        
        .category-header { padding: 20px; border-bottom: 1px solid #1f2940; }
        .category-header h3 { font-size: 16px; margin-bottom: 15px; color: #fff; }
        .categories { display: flex; flex-wrap: wrap; gap: 10px; }
        .category-btn { 
            background: #161c2d; border: 1px solid #1f2940; color: #8e9bb0; 
            padding: 8px 15px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.3s; flex-grow: 1; text-align: center; font-weight: bold;
        }
        .category-btn:hover { background: #1c2438; color: #fff; }
        .category-btn.active { background: #00e5ff; color: #000; border: none; }

        .channel-list-header { padding: 15px 20px 5px; font-size: 14px; color: #00e5ff; font-weight: bold; }
        .channel-list { flex: 1; overflow-y: auto; padding: 10px 20px 10px; }
        .channel-list::-webkit-scrollbar { width: 4px; }
        .channel-list::-webkit-scrollbar-thumb { background: #1f2940; border-radius: 10px; }

        .channel-card { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #161c2d; margin-bottom: 8px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .channel-card:hover { background: #1c2438; transform: translateX(5px); }
        .channel-card.active { border-color: #00e5ff; background: rgba(0, 229, 255, 0.05); }
        .channel-info { display: flex; align-items: center; gap: 12px; width: 100%; }
        
        .channel-icon { width: 45px; height: 45px; background: #fff; border-radius: 6px; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 2px; }
        .channel-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .channel-text { flex: 1; }
        .channel-text h4 { font-size: 14px; color: #fff; margin-bottom: 4px; }
        .channel-text p { font-size: 12px; color: #8e9bb0; }

        #error-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff3b3b; font-weight: bold; display: none; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 5px; text-align: center; }

        /* ব্রান্ডিং ও সোশ্যাল সেকশন */
        .developer-footer { background: #0b101e; padding: 20px; border-top: 1px solid #1f2940; text-align: center; }
        
        .join-telegram-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: #0088cc; color: white; text-decoration: none; padding: 12px;
            border-radius: 8px; font-size: 15px; font-weight: bold; transition: 0.3s;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
        .join-telegram-btn:hover { background: #0077b5; transform: translateY(-2px); }
        .join-telegram-btn i { font-size: 20px; }

        .social-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .social-icon {
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: #161c2d; color: #8e9bb0; text-decoration: none;
            font-size: 18px; transition: 0.3s; border: 1px solid #1f2940;
        }
        .social-icon:hover { color: #fff; transform: translateY(-3px); }
        .social-icon.fb:hover { background: #1877f2; border-color: #1877f2; }
        .social-icon.yt:hover { background: #ff0000; border-color: #ff0000; }
        .social-icon.gh:hover { background: #333333; border-color: #333333; }

        .dev-credit { font-size: 13px; color: #8e9bb0; letter-spacing: 0.5px; }
        .dev-credit span { color: #00e5ff; font-weight: bold; }

        /* ========================================= */
        /* 📱 MOBILE RESPONSIVE DESIGN (Android & iOS) */
        /* ========================================= */
        @media screen and (max-width: 768px) {
            /* হেডার মোবাইলের জন্য ঠিক করা */
            header { padding: 12px 15px; flex-direction: column; text-align: center; gap: 5px; }
            .logo { font-size: 18px; }
            .logo span { display: block; margin-top: 5px; margin-left: 0; font-size: 12px; }

            /* মেইন লেআউট উপর-নিচ (Column) করে দেওয়া */
            .main-container { flex-direction: column; }

            /* ভিডিও প্লেয়ার মোবাইলে YouTube এর মতো ফিট করা */
            .player-section { padding: 10px; flex: none; }
            .video-wrapper { height: auto; aspect-ratio: 16/9; border-radius: 6px; }
            
            /* স্ট্যাটাস বার টেক্সট ছোট করা */
            .status-bar { font-size: 11px; flex-direction: column; align-items: center; gap: 5px; text-align: center; }

            /* সাইডবার (চ্যানেল লিস্ট) নিচে নামিয়ে ফুল স্ক্রিন করা */
            .sidebar { width: 100%; border-left: none; border-top: 1px solid #1f2940; flex: 1; }
            
            .category-header { padding: 15px 10px; }
            .channel-list { padding: 10px; }
            
            /* হোভার ইফেক্ট মোবাইলের জন্য বন্ধ করা (কারণ মোবাইলে টাচ সিস্টেম) */
            .channel-card:hover { transform: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">⚽ Raz Ahamed (Shrabon) Sports Hub <span>| Live Streaming</span></div>
    </header>

    <div class="main-container">
        <div class="player-section">
            <div class="video-wrapper">
                <video id="video-player" controls autoplay playsinline></video> <div id="error-msg">সার্ভার ডাউন বা লিংকটি কাজ করছে না!</div>
            </div>
            <div class="status-bar">
                <div id="current-playing-text">Select a channel to play...</div>
                <div>Server Status: <span style="color:#00e5ff;">Online</span></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="category-header">
                <h3>ক্যাটাগরি নির্বাচন করুন</h3>
                <div class="categories" id="category-container"></div>
            </div>
            
            <div class="channel-list-header" id="list-title">সব চ্যানেল</div>
            
            <div class="channel-list" id="channel-container"></div>

            <div class="developer-footer">
                <a href="https://t.me/realtips6600" target="_blank" class="join-telegram-btn">
                    <i class="fab fa-telegram"></i> Join Telegram for Updates
                </a>
                
                <div class="social-links">
                    <a href="https://www.facebook.com/razahamed369" target="_blank" class="social-icon fb" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.youtube.com/@RazAhamedshrabon" target="_blank" class="social-icon yt" title="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="https://github.com/Raz-Ahamed" target="_blank" class="social-icon gh" title="GitHub"><i class="fab fa-github"></i></a>
                </div>
                
                <div class="dev-credit">
                    Developed by <span>Raz Ahamed (Shrabon)</span>
                </div>
            </div>
        </div>
    </div>

<script>
    let channels = [];
    let categories = [];
    const video = document.getElementById('video-player');
    const errorMsg = document.getElementById('error-msg');
    const channelContainer = document.getElementById('channel-container');
    const categoryContainer = document.getElementById('category-container');
    let hls;

    // ব্যাকএন্ড থেকে নিরাপদ ডেটা (url ছাড়া) ফেচ করা
    async function loadChannelsFromBackend() {
        try {
            const response = await fetch('/api/get_channels');
            channels = await response.json();
            
            categories = ["All", ...new Set(channels.map(ch => ch.category))];
            renderCategories();
            filterByCategory('All', categoryContainer.firstChild);
            
            if(channels.length > 0) {
                setTimeout(() => {
                    const firstCard = document.getElementById(`channel-${channels[0].id}`);
                    playStream(channels[0], firstCard);
                }, 500);
            }
        } catch (error) {
            console.error("Failed to load channels.");
        }
    }

    function renderCategories() {
        categoryContainer.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `category-btn ${cat === 'All' ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => filterByCategory(cat, btn);
            categoryContainer.appendChild(btn);
        });
    }

    function filterByCategory(categoryName, clickedBtn) {
        document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
        if(clickedBtn) clickedBtn.classList.add('active');
        document.getElementById('list-title').innerText = categoryName === 'All' ? "সব চ্যানেল" : `${categoryName} চ্যানেলসমূহ`;

        const filteredChannels = categoryName === 'All' ? channels : channels.filter(ch => ch.category === categoryName);
        renderChannels(filteredChannels);
    }

    function renderChannels(channelList) {
        channelContainer.innerHTML = '';
        channelList.forEach((channel) => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.id = `channel-${channel.id}`;
            card.onclick = () => playStream(channel, card);

            card.innerHTML = `
                <div class="channel-info">
                    <div class="channel-icon">
                        <img src="${channel.logo}" alt="logo" onerror="this.src='https://via.placeholder.com/45x45?text=TV'">
                    </div>
                    <div class="channel-text">
                        <h4>${channel.name}</h4>
                        <p>${channel.category}</p>
                    </div>
                </div>
            `;
            channelContainer.appendChild(card);
        });
    }

    function playStream(channelData, clickedCard) {
        document.querySelectorAll('.channel-card').forEach(card => card.classList.remove('active'));
        if(clickedCard) clickedCard.classList.add('active');

        document.getElementById('current-playing-text').innerHTML = `Currently Playing: <span style="color:#00e5ff; font-weight:bold;">${channelData.name}</span>`;
        errorMsg.style.display = 'none';

        if (hls) hls.destroy();
        
        // এখানে মূল সিকিউরিটি: আমরা URL এর বদলে শুধু ID পাঠাচ্ছি
        const proxyUrl = `/proxy?id=${channelData.id}`;
        
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(proxyUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    errorMsg.style.display = 'block';
                    hls.destroy();
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxyUrl;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    // পেজ লোড হলে API কল হবে
    window.onload = loadChannelsFromBackend;
</script>>
</body>
</html>
